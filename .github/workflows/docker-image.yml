# 工作流名称
name: Auto Build and Push Docker Image

# 触发条件：推送到main分支、创建v开头的标签时触发
on:
  # push:
  #   branches: [ "main" ]  # 替换为你的主分支（如master）
  #   tags: [ 'v*' ]        # 标签以v开头时触发（如v1.0.0）
  # 可选：手动触发（方便测试）
  workflow_dispatch:
    inputs:
      # 外部仓库用户名/外部仓库名 例如：drawdb-io/drawdb
      external_repo:
        description: '外部公共仓库地址（格式：用户名/仓库名）'
        required: true
        default: 'drawdb-io/drawdb' # 替换为你的目标仓库
      # 要拉取的分支（如 main、dev）
      target_tag:
        description: '要拉取的仓库 Tag（如 v1.0.0）'
        required: true
        default: 'v1.0.0' # 替换为你要的 Tag
        
# 定义任务
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 步骤1：拉取外部公共仓库代码（替换成你的目标仓库！）
      - name: Checkout external public repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.external_repo || 'drawdb-io/drawdb' }} # 外部仓库地址
          ref: ${{ github.event.inputs.target_tag || 'v1.0.0' }} # 核心：指定 Tag 版本
          path: ./app # 代码下载到当前工作目录的 app 文件夹（避免路径问题）
          # 公共仓库无需 token，注释掉即可
          # token: ${{ secrets.EXTERNAL_REPO_PAT }}
          
      # 步骤2：验证拉取的代码版本（可选，确认 Tag 正确）
      - name: Verify checkout tag
        working-directory: ./app # 进入代码目录
        run: |
          git tag --list # 列出所有 Tag
          git describe --tags # 输出当前检出的 Tag/版本  
          
     # 步骤3：设置 QEMU（多架构构建需要）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3     
        
      # 步骤4：设置Docker Buildx（增强构建能力，支持多平台）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true  # 确保安装最新版Buildx，支持多架构
          
      # 步骤5：登录Docker Hub（使用配置的密钥）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 步骤6：生成镜像标签（区分分支/标签）
      - name: Define image tags
        id: gen_tags
        run: |
          # 镜像仓库地址（替换为你的Docker Hub仓库名）
          IMAGE_NAME="${{ secrets.DOCKER_HUB_USERNAME}}/${{github.event.inputs.external_repo}}"
          # 镜像标签：latest + 外部仓库 Tag
          TARGET_TAG="${{ github.event.inputs.target_tag || 'v1.0.0' }}"
          TAGS="${IMAGE_REPO}:latest,${IMAGE_REPO}:${TARGET_TAG}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      # 步骤7：构建并推送多架构镜像
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: ./app            # 指向外部代码存放目录
          file: ./Dockerfile        # 指定Dockerfile路径（默认根目录可省略）
          push: true                # 开启推送
          tags: ${{ steps.gen_tags.outputs.tags }}  # 使用步骤6生成的标签
          platforms: linux/amd64,linux/arm64/v8  # 指定要构建的架构（AMD64 + ARM64） arm64/v8 是主流ARM架构（如树莓派4、云服务器ARM）
          # 可选：启用缓存，加速后续构建（推荐开启）
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/${{github.event.inputs.external_repo}}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/${{github.event.inputs.external_repo}}:buildcache,mode=max
          # 可选：如果Dockerfile有跨架构兼容问题，启用此选项
          # build-args: |
          #   ARCH=linux/arm64/v8
